name: Stale

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-message: 'Inactive for 60 days; closing in 14 days without further activity.'
          stale-pr-message: 'Inactive for 60 days; closing in 14 days without further activity.'
