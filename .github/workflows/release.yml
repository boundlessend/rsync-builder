name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    # requires the macOS 26 SDK (native Liquid Glass)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: build app bundle
        run: ./build.sh
      - name: package dmg
        run: ./dmg.sh  # оформленный DMG: фон + раскладка иконок (hdiutil + Finder AppleScript)
      # the app is not signed or notarized - Gatekeeper warns on first launch
      - name: publish github release
        uses: softprops/action-gh-release@v2
        with:
          files: rsync-builder.dmg
          generate_release_notes: true
          body: |
            **rsync builder** is a macOS menu bar app that helps you assemble and run `rsync`
            commands for moving files between your Mac and a server.

            ### Install
            1. Open `rsync-builder.dmg` and drag **rsync builder** into **Applications**.
            2. The app runs in the menu bar (no Dock icon) - click its icon to open the panel.
            3. It is not signed or notarized, so on first launch right-click the app and choose **Open**, then confirm.

            Requires macOS 26 or later.
