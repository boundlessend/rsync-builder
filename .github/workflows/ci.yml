name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: logic check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      # чистая функция сборки команды на Foundation - работает на любом macOS-раннере
      - name: command-builder assertions
        run: |
          swiftc Sources/rsync-builder/Command.swift tests/main.swift -o /tmp/rsync_check
          /tmp/rsync_check
      # смоук: реальный локальный rsync + доставка пароля через SSH_ASKPASS (без серверов и дисплея)
      - name: smoke (rsync run + askpass wiring)
        run: |
          swiftc Sources/rsync-builder/Command.swift tests/smoke.swift -o /tmp/rsync_smoke
          /tmp/rsync_smoke

  build:
    name: release build
    # страховка "main всегда собирается"; полная релизная сборка - в release.yml на теге.
    # требует macOS 26 SDK (нативный Liquid Glass) - на macos-latest он есть
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: swift build (release)
        run: swift build -c release
